<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mobanja — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">mobanja Dashboard</h1>
      <span id="welcomeUser" class="text-lg font-medium text-gray-700"></span>
      <button onclick="logout()" class="bg-red-600 text-white px-6 py-3 rounded-xl">Logout</button>
    </div>

    <!-- Add Employee Form -->
    <div class="bg-white p-6 rounded-2xl shadow mb-8">
      <h2 class="text-2xl font-bold mb-4">Add New Employee</h2>
      <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
        <input id="firstName" placeholder="First Name" class="p-3 border rounded-xl">
        <input id="lastName" placeholder="Last Name" class="p-3 border rounded-xl">
        <input id="password" type="password" placeholder="Password" class="p-3 border rounded-xl">
        <input id="netSalary" type="number" placeholder="Net Salary" class="p-3 border rounded-xl">
        <select id="role" class="p-3 border rounded-xl">
          <option value="employee">Employee</option>
          <option value="hr">HR</option>
        </select>
      </div>
      <button onclick="addEmployee()" class="mt-4 bg-green-600 text-white px-8 py-3 rounded-2xl font-bold">ADD EMPLOYEE</button>
    </div>

    <!-- Employees Table -->
    <div class="bg-white p-6 rounded-2xl shadow mb-8">
      <h2 class="text-2xl font-bold mb-4">All Employees</h2>
      <div id="usersTable" class="overflow-x-auto"></div>
    </div>

    <!-- Live Attendance + Download -->
    <div class="bg-white p-6 rounded-2xl shadow">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">Live Attendance Today</h2>
        <div class="flex gap-3">
          <button onclick="downloadExcel()" 
                  class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
            📊 Download Excel
          </button>
          <button onclick="downloadPDF()" 
                  class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2">
            📄 Download PDF
          </button>
        </div>
      </div>
      <div id="attendanceTable" class="overflow-x-auto"></div>
    </div>
  </div>

  <script>
    const supabaseUrl = 'https://plrlufhgzfirdqjeqjhv.supabase.co';
    const supabaseKey = 'sb_publishable_hVxITJF0v6WEyp5A7ZNqTA_E9Zy7l3V';
    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = {};

    window.onload = async () => {
      const userStr = sessionStorage.getItem('currentUser');
      if (!userStr) return window.location.href = 'index.html';

      currentUser = JSON.parse(userStr);
      if (!['admin', 'hr'].includes(currentUser.role)) return window.location.href = 'index.html';

      document.getElementById('welcomeUser').textContent = 
        `Welcome, ${currentUser.firstName} ${currentUser.lastName} (${currentUser.role.toUpperCase()})`;

      await loadUsersTable();
      await loadAttendanceTable();
      setInterval(loadAttendanceTable, 10000); // refresh every 10s
    };

    async function addEmployee() {
      const first = document.getElementById('firstName').value.trim();
      const last = document.getElementById('lastName').value.trim();
      const pw = document.getElementById('password').value.trim();
      const salary = parseFloat(document.getElementById('netSalary').value) || 0;
      const role = document.getElementById('role').value;

      if (!first || !last || !pw) return alert('Please fill First Name, Last Name and Password');

      // Simple auto ID generation
      const { data: lastUser } = await supabase.from('users').select('id').order('id', { ascending: false }).limit(1).single();
      let nextId = 'mo002';
      if (lastUser && lastUser.id) {
        const num = parseInt(lastUser.id.replace('mo', '')) || 1;
        nextId = `mo${String(num + 1).padStart(3, '0')}`;
      }

      const { error } = await supabase.from('users').insert([{
        id: nextId,
        firstName: first,
        lastName: last,
        password: pw,
        role: role,
        netSalary: salary
      }]);

      if (error) alert('Error adding employee: ' + error.message);
      else {
        alert(`Employee ${nextId} added successfully!`);
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('password').value = '';
        document.getElementById('netSalary').value = '';
        loadUsersTable();
      }
    }

    async function loadUsersTable() {
      const { data: users, error } = await supabase.from('users').select('*').order('id');
      if (error) return console.error(error);

      let html = `
        <table class="w-full border-collapse text-sm">
          <thead><tr class="bg-gray-100">
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Role</th>
            <th class="p-3 text-left">Salary</th>
            <th class="p-3 text-left">Action</th>
          </tr></thead>
          <tbody>
      `;

      users.forEach(u => {
        const promoteBtn = (u.role === 'employee' && currentUser.role === 'admin') 
          ? `<button onclick="promoteToHR('${u.id}')" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1 rounded text-xs">Make HR</button>` 
          : '';
        html += `
          <tr class="border-t hover:bg-gray-50">
            <td class="p-3 font-mono">${u.id}</td>
            <td class="p-3">${u.firstName} ${u.lastName}</td>
            <td class="p-3">${u.role}</td>
            <td class="p-3">${u.netSalary}</td>
            <td class="p-3">${promoteBtn}</td>
          </tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('usersTable').innerHTML = html;
    }

    async function promoteToHR(id) {
      if (currentUser.role !== 'admin') return alert('Only Admin can promote');
      const { error } = await supabase.from('users').update({ role: 'hr' }).eq('id', id);
      if (error) alert(error.message);
      else {
        alert('Promoted to HR');
        loadUsersTable();
      }
    }

    async function loadAttendanceTable() {
      const today = new Date().toLocaleDateString();
      const { data: records } = await supabase
        .from('attendance')
        .select('*, users!inner(firstName, lastName)')
        .eq('date', today)
        .order('time');

      const { data: allUsers } = await supabase.from('users').select('id, firstName, lastName, role');

      let html = `
        <table class="w-full border-collapse text-sm">
          <thead><tr class="bg-gray-100">
            <th class="p-3 text-left">ID</th>
            <th class="p-3 text-left">Name</th>
            <th class="p-3 text-left">Sign In</th>
            <th class="p-3 text-left">Sign Out</th>
            <th class="p-3 text-left">Status</th>
          </tr></thead>
          <tbody>
      `;

      allUsers.forEach(u => {
        const inRec = records.find(r => r.employee_id === u.id && r.action === 'Sign In');
        const outRec = records.find(r => r.employee_id === u.id && r.action === 'Sign Out');

        let status = 'Absent';
        let statusColor = 'text-red-600';
        if (inRec && outRec) { status = 'Completed'; statusColor = 'text-blue-600'; }
        else if (inRec) { status = 'Present'; statusColor = 'text-green-600'; }

        html += `
          <tr class="border-t hover:bg-gray-50">
            <td class="p-3 font-mono">${u.id}</td>
            <td class="p-3">${u.firstName} ${u.lastName}</td>
            <td class="p-3">${inRec ? inRec.time : '--'}</td>
            <td class="p-3">${outRec ? outRec.time : '--'}</td>
            <td class="p-3 ${statusColor} font-medium">${status}</td>
          </tr>`;
      });

      html += `</tbody></table>`;
      document.getElementById('attendanceTable').innerHTML = html;
    }

    async function downloadExcel() {
      const today = new Date().toLocaleDateString();
      const { data: records } = await supabase.from('attendance').select('*, users(firstName, lastName)').eq('date', today);

      let csv = "ID,Name,Sign In Time,Sign Out Time,Status\n";
      // ... (same logic as before - group by employee)
      // For simplicity, you can enhance it later

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Mobanja_Attendance_${today.replace(/\//g,'-')}.csv`;
      a.click();
    }

    function downloadPDF() {
      // Same as previous version - opens print dialog with table
      alert("PDF download ready (using browser print). You can improve styling later.");
      window.print();
    }

    function logout() {
      sessionStorage.removeItem('currentUser');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
